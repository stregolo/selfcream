name: Generatore Chiavi SSH (BeamUp)
on:
  workflow_dispatch: # Permette l'esecuzione manuale da GitHub Actions

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Genera Chiave ED25519
        run: |
          ssh-keygen -t ed25519 -N "" -f ./id_ed25519 -C "beamup-key"
          
      - name: 📋 COPIA LE TUE CHIAVI
        run: |
          echo "================================================================"
          echo "   CHIAVE PUBBLICA (Da mettere in GitHub > Settings > SSH Keys)  "
          echo "================================================================"
          cat ./id_ed25519.pub
          echo ""
          echo "================================================================"
          echo "   CHIAVE PRIVATA (Da mettere in Repository Secrets > SSH_PRIVATE_KEY) "
          echo "================================================================"
          cat ./id_ed25519
          echo ""
          echo "================================================================"
          echo "ATTENZIONE: Elimina il log di questa azione dopo aver copiato le chiavi per sicurezza!"
